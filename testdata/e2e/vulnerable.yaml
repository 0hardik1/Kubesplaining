apiVersion: v1
kind: Namespace
metadata:
  name: vulnerable
---
apiVersion: v1
kind: Namespace
metadata:
  name: flat-network
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: privileged-reader
  namespace: vulnerable
---
apiVersion: v1
kind: Secret
metadata:
  name: legacy-token
  namespace: vulnerable
  annotations:
    kubernetes.io/service-account.name: privileged-reader
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: vulnerable
data:
  db_password: super-secret
  api_token: placeholder
---
apiVersion: v1
kind: Service
metadata:
  name: fake-webhook
  namespace: vulnerable
spec:
  selector:
    app: fake-webhook
  ports:
    - name: https
      port: 443
      targetPort: 8443
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: privileged-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: privileged-reader
subjects:
  - kind: ServiceAccount
    name: privileged-reader
    namespace: vulnerable
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: privileged-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risky-app
  namespace: vulnerable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risky-app
  template:
    metadata:
      labels:
        app: risky-app
    spec:
      serviceAccountName: default
      hostNetwork: true
      containers:
        - name: app
          image: nginx:latest
          securityContext:
            privileged: true
          volumeMounts:
            - name: rootfs
              mountPath: /host
      volumes:
        - name: rootfs
          hostPath:
            path: /
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: flat-network
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: nginx:1.27.5
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-broad
  namespace: flat-network
spec:
  podSelector:
    matchLabels:
      app: api
  ingress:
    - from:
        - namespaceSelector: {}
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: risky-ignore-webhook
webhooks:
  - name: mutate.vulnerable.local
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: ["kube-system"]
    objectSelector:
      matchLabels:
        admission: enabled
    clientConfig:
      service:
        namespace: vulnerable
        name: fake-webhook
        path: /mutate
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
